name: Build BrickForge

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements-dev.txt

      - name: Bundle Python sidecar
        run: python scripts/bundle-sidecar.py

      - name: Build and package
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brickforge-win-x64
          path: dist-electron/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '21', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: npm ci
      - run: pip install -r sidecar/requirements-dev.txt
      - run: python3 scripts/bundle-sidecar.py
      - run: npm run package:mac
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/upload-artifact@v4
        with:
          name: brickforge-mac
          path: dist-electron/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '21', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: npm ci
      - run: pip install -r sidecar/requirements-dev.txt
      - run: python3 scripts/bundle-sidecar.py
      - run: npm run package:linux
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/upload-artifact@v4
        with:
          name: brickforge-linux
          path: dist-electron/*.AppImage
